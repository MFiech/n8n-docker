services:
  whoop-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whoop-mcp-server
    restart: unless-stopped
    ports:
      - "3000:3000"  # OAuth callback server
      - "3005:3001"  # MCP HTTP/SSE server (was 3002, now behind nginx proxy)
    environment:
      - NODE_ENV=production
      - WHOOP_CLIENT_ID=${WHOOP_CLIENT_ID}
      - WHOOP_CLIENT_SECRET=${WHOOP_CLIENT_SECRET}
      - WHOOP_REDIRECT_URI=${WHOOP_REDIRECT_URI}
      - MCP_SERVER_PORT=3002
      - PORT=3002
      - MCP_SILENT=true
    volumes:
      - whoop-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - whoop-network

volumes:
  whoop-data:
    driver: local
    name: whoop-mcp-data

networks:
  whoop-network:
    driver: bridge
    name: whoop-mcp-network
