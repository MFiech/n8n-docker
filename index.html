<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 48px 24px;
    }
    header { text-align: center; margin-bottom: 48px; }
    header h1 { font-size: 2rem; font-weight: 700; color: #f8fafc; letter-spacing: -0.02em; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      display: block;
      background: #1e2330;
      border: 1px solid #2d3348;
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: #4f6ef7;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(79,110,247,0.15);
    }
    .card-icon { font-size: 2rem; margin-bottom: 14px; display: block; }
    .card-title { font-size: 1.15rem; font-weight: 600; color: #f1f5f9; margin-bottom: 6px; }
    .card-desc { font-size: 0.875rem; color: #64748b; line-height: 1.5; margin-bottom: 16px; }
    .card-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.75rem; font-weight: 500; color: #94a3b8;
      background: #0f1117; border: 1px solid #2d3348;
      border-radius: 6px; padding: 4px 10px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  </style>
</head>
<body>
<header>
  <h1>Services</h1>
</header>
<div class="grid" id="grid"></div>
<script>
  const tsHost = 'podcast-analyzer-server.tail6ec6d8.ts.net';
  const directHost = '100.76.97.125';
  const services = [
    { icon: '🎙️', title: 'SpotCast Analyzer', desc: 'Podcast analysis and summarization.', url: 'http://' + directHost + ':3001' },
    { icon: '⚡', title: 'n8n', desc: 'Workflow automation platform.', url: 'https://' + tsHost + ':5678' },
    { icon: '📋', title: 'Dozzle', desc: 'Real-time Docker log viewer.', url: 'http://' + directHost + ':5001' },
  ];
  const grid = document.getElementById('grid');
  services.forEach(({ icon, title, desc, url }) => {
    const port = url.split(':').pop();
    const a = document.createElement('a');
    a.className = 'card';
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = '<span class="card-icon">' + icon + '</span><div class="card-title">' + title + '</div><div class="card-desc">' + desc + '</div><span class="card-badge"><span class="dot"></span>:' + port + '</span>';
    grid.appendChild(a);
  });
</script>
</body>
</html>
