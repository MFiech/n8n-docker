server {
    listen 80;

    # Serve homepage for plain browser GET /
    # Proxy to WHOOP for SSE connections (Claude MCP) and POST messages
    location = / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;

        if ($http_accept ~* "text/event-stream") {
            proxy_pass http://whoop-mcp-server:3001;
        }
        if ($request_method = POST) {
            proxy_pass http://whoop-mcp-server:3001;
        }

        root /usr/share/nginx/html;
        index index.html;
    }

    # All other paths (SSE /sse, /messages, /health, /callback) → WHOOP
    location / {
        proxy_pass http://whoop-mcp-server:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}
