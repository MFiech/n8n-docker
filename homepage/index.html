<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 48px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }

    header p {
      margin-top: 8px;
      color: #64748b;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 960px;
      margin: 0 auto;
    }

    .card {
      display: block;
      background: #1e2330;
      border: 1px solid #2d3348;
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }

    .card:hover {
      border-color: #4f6ef7;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(79, 110, 247, 0.15);
    }

    .card-icon {
      font-size: 2rem;
      margin-bottom: 14px;
      display: block;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 0.875rem;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #94a3b8;
      background: #0f1117;
      border: 1px solid #2d3348;
      border-radius: 6px;
      padding: 4px 10px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      flex-shrink: 0;
    }

    .section-label {
      max-width: 960px;
      margin: 0 auto 16px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #475569;
    }

    .section-label:not(:first-of-type) {
      margin-top: 36px;
    }
  </style>
</head>
<body>

<header>
  <h1>Service Catalog</h1>
  <p id="server-host"></p>
</header>

<p class="section-label">Applications</p>
<div class="grid" id="apps-grid"></div>

<p class="section-label">Tools &amp; Infrastructure</p>
<div class="grid" id="tools-grid"></div>

<script>
  const host = window.location.hostname;
  document.getElementById('server-host').textContent = host;

  function url(port, path) {
    return 'http://' + host + ':' + port + (path || '');
  }

  const apps = [
    {
      icon: '🎙️',
      title: 'SpotCast Analyzer',
      desc: 'Podcast analysis and summarization tool.',
      port: 3001,
    },
    {
      icon: '⚡',
      title: 'n8n',
      desc: 'Workflow automation and integration platform.',
      port: 5678,
    },
  ];

  const tools = [
    {
      icon: '📋',
      title: 'Dozzle',
      desc: 'Real-time Docker container log viewer.',
      port: 5001,
    },
    {
      icon: '🗣️',
      title: 'Kokoro TTS',
      desc: 'Text-to-speech API (FastAPI).',
      port: 8880,
      path: '/docs',
    },
    {
      icon: '🎙️',
      title: 'Podcast API',
      desc: 'SpotCast backend REST API.',
      port: 5002,
      path: '/docs',
    },
  ];

  function renderCards(items, containerId) {
    const grid = document.getElementById(containerId);
    items.forEach(({ icon, title, desc, port, path }) => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = url(port, path);
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <span class="card-icon">${icon}</span>
        <div class="card-title">${title}</div>
        <div class="card-desc">${desc}</div>
        <span class="card-badge"><span class="dot"></span>:${port}</span>
      `;
      grid.appendChild(a);
    });
  }

  renderCards(apps, 'apps-grid');
  renderCards(tools, 'tools-grid');
</script>
</body>
</html>
