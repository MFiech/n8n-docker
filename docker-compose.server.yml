services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=sqlite
      - NODE_OPTIONS=--max-old-space-size=4096
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=false
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
      - CHROME_BIN=/usr/bin/chromium-browser
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-accelerated-2d-canvas,--no-first-run,--no-zygote,--single-process,--disable-gpu
      - PUPPETEER_NEW_BROWSER_PER_EXECUTION=false
      - CHROME_NO_FIRST_RUN=true
      - CHROME_DISABLE_GPU_SANDBOX=true
      - PUPPETEER_BROWSER_TIMEOUT=120000
      - CHROME_DISABLE_BACKGROUND_MODE=true
      - PUPPETEER_CLEANUP_INTERVAL=60000
      - N8N_LOG_LEVEL=info
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
      - /dev/shm:/dev/shm
    cap_add:
      - SYS_ADMIN
    shm_size: 2gb
    security_opt:
      - seccomp:unconfined
    networks:
      - n8n-network

networks:
  n8n-network:
    name: n8n-network

volumes:
  n8n_data:
    name: n8n_data
